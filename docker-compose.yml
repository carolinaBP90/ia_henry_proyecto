version: "3.9"

services:
  api:
    build: .
    container_name: ia_henry_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - qdrant

  redis:
    image: redis:7-alpine
    container_name: ia_henry_redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: ia_henry_postgres
    environment:
      POSTGRES_USER: henry
      POSTGRES_PASSWORD: henry
      POSTGRES_DB: ia_henry
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: ia_henry_qdrant
    ports:
      - "6333:6333"
